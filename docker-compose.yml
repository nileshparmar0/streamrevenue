services:
  postgres:
    image: postgres:15-alpine
    container_name: streamrevenue-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: streamrevenue
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: streamrevenue-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

volumes:
  redis_data: